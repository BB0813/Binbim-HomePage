<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binbim - 文章</title>
    <meta name="description" content="Binbim 的文章页面，记录技术实践、项目复盘与开发笔记。">
    <link rel="icon" href="https://q1.qlogo.cn/g?b=qq&nk=1721822150&s=640" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>

    <link rel="stylesheet" href="css/modern.css">
    <link rel="stylesheet" href="css/article.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="logo-text">Binbim</a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">主页</a>
                <a href="#articles" class="nav-link active">文章</a>
                <a href="#guide" class="nav-link">写作说明</a>
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <section id="articles" class="article-page">
        <div class="container">
            <header class="article-header">
                <p class="article-kicker">Article Space</p>
                <h1 class="article-title">技术文章</h1>
                <p class="article-subtitle">在这里集中发布开发复盘、实践笔记和工具链经验。</p>
            </header>

            <div class="article-toolbar">
                <label class="search-box" for="article-search">
                    <i data-lucide="search"></i>
                    <input id="article-search" type="search" placeholder="搜索标题、摘要或标签...">
                </label>
                <div class="category-filters" id="category-filters" aria-label="文章分类"></div>
                <label class="draft-toggle" for="show-draft">
                    <input id="show-draft" type="checkbox">
                    <span>显示草稿</span>
                </label>
            </div>
            <div class="article-stats" id="article-stats" aria-live="polite"></div>

            <div class="article-layout">
                <div class="article-list-panel">
                    <div class="article-list" id="article-list" aria-live="polite"></div>
                    <div class="article-pagination" id="article-pagination" aria-label="文章分页"></div>
                </div>
                <aside class="article-reader" id="article-reader">
                    <div class="reader-placeholder">
                        <i data-lucide="book-open-text"></i>
                        <p>从左侧选择一篇文章开始阅读。</p>
                    </div>
                </aside>
            </div>
        </div>
    </section>

    <section id="guide" class="article-guide">
        <div class="container">
            <div class="guide-card">
                <h2>写作说明</h2>
                <p>当前文章列表数据由 <code>articles.json</code> 驱动，支持分类、搜索、高亮和分页。</p>
                <p>列表页与详情页共用一份数据，默认仅显示 <code>published</code>，可勾选“显示草稿”预览 <code>draft</code>。</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-text">
                    <p>&copy; 2023-2026 Binbim. 文章页已启用。</p>
                </div>
                <div class="footer-social">
                    <a href="index.html" class="social-link" aria-label="Home">
                        <i data-lucide="house"></i>
                    </a>
                    <a href="https://github.com/BB0813" class="social-link" aria-label="GitHub" target="_blank" rel="noopener noreferrer">
                        <i data-lucide="github"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/modern.js"></script>
    <script src="articles-data.js"></script>
    <script src="js/article-utils.js"></script>
    <script src="js/article.js"></script>
    <script>
        // 统一的图标初始化（与 index.html 相同的降级机制）
        (function() {
            const initIcons = () => {
                if (typeof lucide !== 'undefined' && lucide.createIcons) {
                    try { lucide.createIcons(); } catch(e) { fallbackToSVG(); }
                } else {
                    fallbackToSVG();
                }
            };

            const fallbackToSVG = () => {
                const svgs = {
                    'github': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>',
                    'house': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
                    'search': '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
                    'tag': '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
                    'calendar': '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
                    'clock-3': '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
                    'book-open-text': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
                    'arrow-up-right': '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>'
                };
                document.querySelectorAll('i[data-lucide]').forEach(el => {
                    const name = el.getAttribute('data-lucide');
                    if (!el.innerHTML.trim()) {
                        el.innerHTML = svgs[name] || `[${name}]`;
                        el.style.display = 'inline-flex';
                        el.style.alignItems = 'center';
                    }
                });
            };

            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.js';
            script.onload = () => setTimeout(initIcons, 100);
            script.onerror = () => initIcons();
            script.async = true;
            document.head.appendChild(script);
            document.addEventListener('DOMContentLoaded', initIcons);
        })();
    </script>
</body>
</html>
